<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PiuCenter - Novo Chamado</title>
    <link rel="stylesheet" href="../css/painel.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <aside class="sidebar">
        <div class="logo-container">
            <img src="../img/foto.png" alt="Logo">
            <h2>PIU.CENTER</h2>
        </div>

        <ul class="nav-menu">
            <li class="nav-item">
                <a href="painel-colaborador.html" class="nav-link">
                    <i class="fa-regular fa-clipboard"></i> Chamados
                </a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link active">
                    <i class="fa-solid fa-plus"></i> Novo Chamado
                </a>
            </li>
        </ul>

        <div class="profile-section">
            <p class="profile-role">COLABORADOR</p>
            <p class="profile-id" id="user-display">Carregando...</p>
            <button class="btn-logout" id="btn-sair">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> Sair
            </button>
        </div>
    </aside>

    <main class="main-content">
        <div class="header-section">
            <h1>Abertura de Chamado</h1>
        </div>

        <div class="form-container">
           <form id="form-novo-chamado">
                
                <div class="form-layout-split">
                    <div class="form-left">
                        
                        <div class="form-group">
                            <label for="requisitante" class="form-label">REQUISITANTE:</label>
                            <input type="text" id="requisitante" class="form-input" placeholder="Digite o nome do requisitante" required>
                        </div>

                        <div class="form-row">
                            <div class="form-group half-width">
                                <label for="centro-custo" class="form-label">CENTRO DE CUSTO:</label>
                                <input type="text" id="centro-custo" class="form-input" placeholder="Ex: 245" required>
                            </div>

                           <div class="form-group half-width">
                                <label for="tipo-tecnico" class="form-label">TIPO DE TÉCNICO / ÁREA:</label>
                                <select id="tipo-tecnico" class="form-select" required>
                                    <option value="" disabled selected>Selecione a área...</option>
                                    <option value="mecanica">Mecânica Industrial</option>
                                    <option value="eletrica">Elétrica</option>
                                    <option value="automacao">Automação</option>
                                    <option value="ti">Tecnologia da Informação (TI)</option>
                                    <option value="predial">Manutenção Predial</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-row three-cols">
                            <div class="form-group">
                                <label for="urgencia" class="form-label">URGÊNCIA:</label>
                                <select id="urgencia" class="form-select" required>
                                    <option value="" disabled selected>Selecione...</option>
                                    <option value="baixa">Baixa</option>
                                    <option value="media">Média</option>
                                    <option value="alta">Alta</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="local" class="form-label">LOCAL:</label>
                                <input type="text" id="local" class="form-input" placeholder="Ex: Sala 204" required>
                            </div>

                            <div class="form-group">
                                <label for="tipo-servico" class="form-label">TIPO DE SERVIÇO:</label>
                                <select id="tipo-servico" class="form-select" required>
                                    <option value="" disabled selected>Selecione...</option>
                                    <option value="manutencao">Manutenção</option>
                                    <option value="ti">Suporte TI</option>
                                    <option value="limpeza">Limpeza</option>
                                </select>
                            </div>
                        </div>
                    </div> <div class="form-right">
                        <div class="form-group h-100">
                            <label for="descricao" class="form-label">DESCRIÇÃO:</label>
                            <textarea id="descricao" class="form-textarea h-100-textarea" placeholder="Descreva o problema com o máximo de detalhes possível..." required></textarea>
                        </div>
                    </div>
                </div> <div class="form-actions">
                    <button type="button" class="btn-cancel" onclick="history.back()">Cancelar</button>
                    <button type="submit" class="btn-submit" id="btn-enviar-chamado">Abrir Chamado</button>
                </div>
            </form>
        </div>
    </main>

    <button class="btn-suporte-flutuante" id="btn-abrir-suporte" title="Precisa de ajuda?">
        <i class="fa-solid fa-headset"></i>
    </button>

    <div class="suporte-modal-overlay" id="modal-suporte">
        <div class="suporte-modal-content">
            <button class="suporte-fechar" id="btn-fechar-suporte" title="Fechar">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <h3 style="color: #2C3E50; margin-bottom: 5px; font-weight: 800; font-size: 22px;">Suporte PiuCenter</h3>
            <p style="font-size: 13px; color: #A0A0A0; margin-bottom: 25px;">Encontrou um erro ou tem alguma dúvida? Fale com o administrador do sistema.</p>
            
            <form id="form-suporte">
                <div class="form-group" style="margin-bottom: 20px;">
                    <label class="form-label">TIPO DE PROBLEMA:</label>
                    <select class="form-select" required>
                        <option value="" disabled selected>Selecione a categoria...</option>
                        <option value="erro">Bug / Erro no sistema</option>
                        <option value="duvida">Dúvida de utilização</option>
                        <option value="sugestao">Sugestão de melhoria</option>
                    </select>
                </div>
                
                <div class="form-group" style="margin-bottom: 25px;">
                    <label class="form-label">DESCRIÇÃO DO PROBLEMA:</label>
                    <textarea class="form-textarea" rows="4" placeholder="Detalhe o que aconteceu ou a sua dúvida..." required></textarea>
                </div>
                
                <button type="submit" class="btn-submit" style="width: 100%;">Enviar Mensagem</button>
            </form>
        </div>
    </div>

    <script src="../js/painel.js"></script>
    <script src="../js/modal.js"></script>
</body>
</html>
